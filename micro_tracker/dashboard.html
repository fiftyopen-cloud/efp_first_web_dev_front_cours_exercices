<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section aria-labelledby="tracker-title">
  <h1 id="tracker-title">Micro-Tracker</h1>

  <article>
    <h2>Soleil</h2>
    <p>Minutes : <strong id="sun-value">0</strong>/6</p>
    <button id="btn-sun">+1</button>
    <button id="btn-sun-5">+5</button>
  </article>

  <article>
    <h2>Eau</h2>
    <p>Verres : <strong id="water-value">0</strong>/6</p>
    <button id="btn-water">+1</button>
    <button id="btn-water-5">+5</button>
  </article>

  <article>
    <h2>Pause</h2>
    <p>Moments : <strong id="break-value">0</strong>/6</p>
    <button id="btn-break">+1</button>
    <button id="btn-break-5">+5</button>

  </article>

  <p>Total : <strong id="total-value">0</strong></p>
  <button id="btn-reset">Réinitialiser</button>
</section>
<script src="dashboard.js"></script>
</body>
</html>
