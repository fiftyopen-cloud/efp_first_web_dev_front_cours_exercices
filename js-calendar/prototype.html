<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calendar</title>
        <script src="./JSCalendar.js" defer></script>
    </head>
    <body>
        <style>
            * {
                box-sizing: border-box;
                padding: 0;
                margin: 0;
            }

            html, body {
                height: 100vh;
                width: 100vw;
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 20px;

            }

            #calendar-container {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 20px;
            }       
        </style>
        <div id="calendar-container">
            <js-calendar
                id="calendar"
                date="2026-02-21"
            >
            </js-calendar>
    
            <js-calendar
                id="calendar1"
                date="2026-04-28"
                onclick="alert('Date sélectionnéed: ' + this.selectedDate)">
            </js-calendar>

        </div>

        <script>
            document.getElementById('calendar').addEventListener('click', (event) => {
                console.log('Date sélectionnée:', event.target.selectedDate);
            });
        </script>

              
    </body>

</html>
